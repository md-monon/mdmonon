<!DOCTYPE html>
<html>
<head>
<title>Monon's Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
}

.hero{
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* Animated background */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, #00ffff55 0%, transparent 20%),
    radial-gradient(circle at 80% 70%, #0066ff55 0%, transparent 20%),
    linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#06b6d4);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

/* Dark overlay for readability */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

/* Text stays above everything */
.hero-content{
    position:relative;
    z-index:2;
}

h1{
    font-size:4rem;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
}

p{
    font-size:1.5rem;
    margin-top:10px;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <h1>Hello, I'm Monon</h1>
        <p>Welcome to my website</p>
    </div>
</section>

</body>
</html>
